<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harcourtian Store</title>

    <link rel="stylesheet" href="./styles/index.css" />
</head>

<body>
    <header>
        <div>
            <a href="#">ABOUT</a>
        </div>
        <div>
            <h1>SHOP</h1>
        </div>
        <div>
            <a id="sidebar-toggle">BAG</a>
        </div>
    </header>

    <main>
        <section id="search">
            <div>
                <input type="search" placeholder="Search items" id="search-bar"/>

                <div id="products">
                    <h1 style="font-size: 48px; font-weight: 300; text-align:center;">Search to get products</h1>
                </div>
            </div>
        </section>
    </main>

    <div id="sidebar">
        <button id="close-sidebar">
            <img src="./assets/clear.svg" width="30" />
        </button>

        <div class="sidebar-top">
            <h1 class="text-align:center">BAG</h1>
        </div>
        <div class="sidebar-main">

        </div>
        <div  class="sidebar-bottom">
            <button class="button" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <div class="popup-conatiner" style="opacity: 0; visibility: hidden;">
        <div class="popup" style="opacity: 0.0; transform: scale(0.5);">
            <button id="close-popup" onclick="checkoutClose()">
                <img src="./assets/clear.svg" width="30" />
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.0/gsap.min.js"></script>
    <script src="./scripts/index.js"></script>
</body>

</html>
