<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HBTU vLab</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 400;
        }

        body {
            background: #eee;
        }

        header {
            background: darkslateblue;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            color: #fff;
            box-shadow: 0 10px 10px rgba(0, 0, 0, .3);

            height: 50px;
        }

        .clear {
            background: transparent;
            border: 0;
            outline: 0;
            cursor: pointer;
        }


        #sidebar {
            position: fixed;
            height: 94vh;
            width: 400px;
            background: #fff;
            top: 6vh;
            right: -500px;

            box-shadow: -10px 0 20px rgba(0, 0, 0, .3);
        }

        #experiment {
            background: #ccc;
            width: 800px;
            height: 550px;
        }

        .step {
            position: relative;
            width: 100%;
            height: 100%;

            overflow: hidden;
            display: none;
        }

        .step h1.title {
            text-align: center;
            padding: 8px 0;
            background: #fff;
            font-size: 18px;
            box-shadow: 0 10px 10px rgba(0, 0, 0, .3);
            font-weight: 600;
        }

        .step.active {
            display: block;
        }

        .step .element {
            position: absolute;
        }

        #controls {
            display: none;
            position: absolute;
            margin-top: 490px;
            margin-left: -650px;
        }

        #controls button {
            background: #000;
            font-size: 28px;
            color: #fff;
            border: 0;
            outline: 0;
            padding: 8px 20px;
            border-radius: 0;
            box-shadow: 0 0 10px rgba(0, 0, 0, .3);
        }

        #controls.active {
            display: block;
        }
    </style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.3/lottie.min.js" integrity="sha512-35O/v2b9y+gtxy3HK+G3Ah60g1hGfrxv67nL6CJ/T56easDKE2TAukzxW+/WOLqyGE7cBg0FR2KhiTJYs+FKrw==" crossorigin="anonymous"></script>
</head>

<body style="background: #eee">
    <header>
        <h1>NeBI calculation </h1>
        <button class="clear" onclick="toggleSidebar()">
            <img src="assets/checklist.svg" width="50" alt="checklist" />
        </button>
    </header>

    <div style="display: flex; justify-content: center;margin-top: 20px;">
        <div id="experiment">
            <div class="step active" id="step-1" style="background: url('./assets/step1/bgAsset.svg');">
                <h1 class="title">Extraction of Juice</h1>

                <div class="element apple" onclick="juice()"
                    style="z-index: 2;left: 100px; top: 450px; display: flex;justify-content: center;align-items: center;flex-direction: column;">
                    <img src="assets/step1/appleslice.svg" width="80" />
                    <small style="background: #000; color:#fff; padding: 4px; margin-top: 5px;">click to grind
                        apples</small>
                </div>

                <!--
                <img class="element" style="left: 300px;top: 250px" src="assets/step1/juicerAsset 5.svg"
                    width="250" />
            -->
                <!--
                    <img class="element juice" style="left: 550px;top: 350px;" src="assets/step1/juice/0.svg" width="116" />
                 -->

                <div class="bodymovinanim element" style=" left: 120px;top: 100px;width: 600px;"></div>
            </div>

            <div class="step">
                <h1 class="title">Filtration of Juice</h1>
            </div>

            <div class="step">
                <h1 class="title">To determine NeBl</h1>
            </div>

        </div>

        <div id="controls">
            <button onclick="next()">
                Next
            </button>
        </div>
    </div>

    <div id="sidebar">

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/gsap.min.js"></script>
    <script src="scripts/index.js"></script>
    <script src="scripts/step1.js"></script>
</body>

</html>
