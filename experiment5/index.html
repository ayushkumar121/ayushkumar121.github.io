<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HBTU vLab</title>
    <style>
        button {
            outline: 0;
            border: 0;
            font-weight: 600;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 400;
        }

        body {
            background: #eee;
        }

        header {
            background: darkslateblue;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            color: #fff;
            box-shadow: 0 10px 10px rgba(0, 0, 0, .3);

            height: 50px;
        }

        .clear {
            background: transparent;
            border: 0;
            outline: 0;
            cursor: pointer;
        }


        #sidebar {
            position: fixed;
            height: 94vh;
            width: 400px;
            background: #fff;
            top: 6vh;
            right: -500px;
            padding: 20px;

            box-shadow: -10px 0 20px rgba(0, 0, 0, .3);
        }

        #experiment {
            background: #ccc;
            width: 800px;
            height: 550px;
        }

        .step {
            position: relative;
            width: 100%;
            height: 100%;

            overflow: hidden;
            display: none;
        }

        .step h1.title {
            text-align: center;
            padding: 8px 0;
            background: #fff;
            font-size: 18px;
            box-shadow: 0 10px 10px rgba(0, 0, 0, .3);
            font-weight: 600;
        }

        .step.active {
            display: block;
        }

        .step .element {
            position: absolute;
            cursor: pointer;
        }

        #controls {
            display: none;
            position: absolute;
            margin-top: 490px;
            margin-left: -700px;
        }

        #controls button {
            background: #000;
            font-size: 28px;
            color: #fff;
            border: 0;
            outline: 0;
            padding: 8px 20px;
            border-radius: 0;
            box-shadow: 0 0 10px rgba(0, 0, 0, .3);
        }

        #controls.active {
            display: block;
        }

        #taskslist {
            list-style-type: none;
        }

        #taskslist li {
            padding: 5px 0;
            font-size: 22px;
        }
    </style>
    <script src="scripts/lottie.min.js"></script>
</head>

<body style="background: #eee">
    <header>
        <h1>Experiment 3</h1>
        <button class="clear" onclick="toggleSidebar()">
            <img src="assets/checklist.svg" width="50" alt="checklist" />
        </button>
    </header>

    <div style="display: flex; justify-content: center;margin-top: 20px;">
        <div id="experiment">
            <div class="step" id="step-2" style="background: url('./assets/bgAsset.svg');">
                <h1 class="title">Step 2</h1>
                <div class="bodymovinanim" style="position: absolute; top:0; left:0;width:800px;"></div>

                <div class="controls">
                    <small class="control-1 element" onclick="part21()"
                        style="top: 300px; left: 360px; background: #000; color:#fff; padding: 4px;">
                        click to suck liquid 
                    </small>

                    <small class="control-2 element"  onclick="part22()"
                    style="left: 530px; top: 300px; opacity: 0;  background: #000; color:#fff; padding: 4px;">
                        click to pour liquid
                    </small>
                </div>
            </div>

            <div class="step" id="step-3" style="background: url('./assets/bgAsset.svg');">
                <h1 class="title">Step 3</h1>
                <div class="bodymovinanim" style="position: absolute; top:0; left:0;width:800px;"></div>
                
                <div class="controls">
                    <small class="control-1 element" onclick="part31()"
                        style="top: 300px; left: 340px; background: #000; color:#fff; padding: 4px;">
                        click to suck liquid 
                    </small>

                    <small class="control-2 element"  onclick="part32()"
                    style="left: 530px; top: 300px; opacity: 0;  background: #000; color:#fff; padding: 4px;">
                        click to pour liquid
                    </small>
                </div>
            </div>
        </div>

        <div id="controls">
            <button onclick="next()">
                Next
            </button>
        </div>
    </div>

    <div id="sidebar">
        <h1>Task Completed</h1>
        <ul id="taskslist">
        </ul>
    </div>

    <script src="scripts/gsap.min.js"></script>
    <script src="scripts/index.js"></script>
    <script src="scripts/step2.js"></script>
    <script src="scripts/step3.js"></script>
</body>

</html>
